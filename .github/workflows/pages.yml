name: deploy-pages

# Builds and deploys the Astro site to GitHub Pages.
# Triggered on pushes to main that touch src/, public/, or data/.
# Also triggered manually via workflow_dispatch.
#
# Depends on test.yml passing implicitly: test.yml runs on every push and
# will fail the commit status if pytest or playwright fails. GitHub Pages
# deploys can still be gated via branch protection rules requiring the
# test workflow to pass before merge.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "data/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build astro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
