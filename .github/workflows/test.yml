name: test

# Runs pytest + playwright on every push and PR.
# This is the quality gate — pages.yml depends on a green run on main
# before the deploy workflow is allowed to publish.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install yt-dlp (required by some fetcher tests)
        run: sudo apt-get update && sudo apt-get install -y yt-dlp

      - name: Run pytest with coverage
        run: python -m pytest tests/ -v

  astro-check:
    name: astro check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Astro check + build
        run: npm run build

      - name: Upload build artifact for Playwright job
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist/
          retention-days: 1

  playwright:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: astro-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: dist/

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
