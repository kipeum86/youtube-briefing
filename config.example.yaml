# YouTube Briefing — pipeline + channel configuration
#
# Edit this file to change channels or pipeline settings. Channel IDs must be
# the YouTube UC... format. Use `python scripts/resolve-channel-ids.py @handle`
# to convert a @handle URL to an ID.

pipeline:
  summarizer:
    provider: gemini
    # Use the latest available Gemini Flash model string at the time of setup.
    # "-latest" aliases and "-preview" models are fine per user decision (qualitative eval only).
    model: gemini-3-flash-preview
    repair_model: null
    # Set PROMPT_VERSION_OVERRIDE=v1 locally if you need a quick rollback.
    prompt_version: v2
    output_format: json
    temperature: null
    max_output_tokens: 3000
    request_timeout_seconds: 90
    transient_retries: 2
    transient_backoff_seconds: 5
    repair_attempts: 2
    full_retries: 2
    short_output_retries: 2

  # Summary length constraints (Korean characters)
  summary_min_chars: 1000
  summary_max_chars: 1800
  summary_headline_max_chars: 24
  context_max_chars: 30000

  # Per-channel discovery cap: how many NEW videos per channel per run.
  # YouTube's RSS feed returns ~15 items; we cap below that so a single
  # run doesn't burn through a burst of uploads. 10 is the sweet spot —
  # enough headroom for channels that post 2-3 videos/day between runs,
  # not so many that 3-day steady-state processing balloons.
  max_new_videos_per_channel: 10
  max_discovery_concurrency: 4
  max_processing_concurrency: 2

  # Skip YouTube videos shorter than this many seconds. This drops Shorts and
  # short clips that are too thin for durable briefings.
  # 1200s (20 min) keeps the feed focused on full-length discussions.
  # Set to 0 or null to disable filtering.
  min_duration_seconds: 1200

  # Local cron schedule: Mon/Wed/Fri 06:00 KST (= 21:00 UTC Sun/Tue/Thu)
  cron: "0 21 * * 0,2,4"

  # Local-only directories (gitignored)
  transcript_cache_dir: data/transcripts
  log_dir: logs

channels:
  # Add your channels here. To find a YouTube channel ID from a @handle:
  #   python scripts/resolve-channel-ids.py @your-channel-handle
  # Each entry needs:
  #   id:    the UCxxxxxxxxxxxxxxxxxxxxxx format channel ID
  #   name:  the channel's display name (used in briefing metadata + UI)
  #   slug:  a lowercase-alphanumeric short identifier, used in filenames
  #          and as the channel filter key in the frontend
  - id: "UCxxxxxxxxxxxxxxxxxxxxxx"
    name: "Example Channel"
    slug: example

blogs:
  # Optional Naver blog sources. Each entry needs:
  #   blog_id: the blog account id used in https://blog.naver.com/<blog_id>
  #   name:    display name used in briefing metadata + UI
  #   slug:    lowercase identifier used in filenames and filters
  - blog_id: "exampleblog"
    name: "Example Naver Blog"
    slug: example-blog
